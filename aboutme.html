    <div id="flush-collapseOne" class="accordion-collapse collapse" aria-labelledby="flush-headingOne" data-bs-parent="#accordionFlushExample">
      <div class="accordion-body"> 大家好，我叫黃義展，目前是一名學生。我個性開朗、認真負責，對於新事物總是抱持著學習的熱忱。在學校除了努力完成課業外，也喜歡接觸資訊科技相關知識，特別是網頁設計、電腦應用以及人工智慧等領域。
平時我喜歡透過網路學習新技能，並嘗試將所學運用在實際作品中。我相信持續學習與不斷挑戰自己，才能讓自己獲得更多成長。遇到困難時，我會積極尋找解決方法，並從過程中累積經驗。
未來希望能夠精進自己的專業能力，培養創新思維與團隊合作精神，朝著理想目標一步一步前進。很高興有這個機會向大家介紹自己，謝謝大家。</div>

此外，我也具有良好的合作精神，能夠與同學或團隊成員互相溝通、共同完成目標。在面對挑戰與困難時，我不輕易放棄，而是努力尋找解決方法，從過程中累積經驗並提升自己。我相信持續學習與自我成長，是讓自己不斷進步的重要關鍵。</div>
