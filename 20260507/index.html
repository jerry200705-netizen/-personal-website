<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>請假申請單</title>
    <link rel="stylesheet" href="問卷調查.css" media="all">
</head>
<body>
    
 <html>   
    
    <img src="leave_request_form_1.jpg" alt="" class="img">
    <h1>請假申請單</h1>
<p>❗快來使用此範本，可以編輯這份範本的所有內容、圖片<br>
    有請假需求的同仁，請填寫此份申請表
</p>



<div class="a">1申請人姓名</div>
<input type="text" placeholder="請填入文字">

<div class="b">2所屬單位</div>
<select name="" id="">
<option value>請選擇</option>slot
<option value="1">行銷部門</option>slot
<option value="2">業務部門</option>slot
<option value="3">財務部門</option>slot
<option value="4">人資部門</option>slot
<option value="5">研發部門</option>slot
<option value="6">運營部門</option>slot
<option value="7">客服部門</option>slot
<option value="8">品管部門</option>slot
<option value="9">IT 部門</option>slot
<option value="10">公關部門</option>slot
</select>

<div class="c" >
    <h2>請假須知</h2>
    請注意：<br>
    
    
    - 超過五天的假，請提前通知您的主管、職務代理人，以便組織進行必要的調整。<br>
    
    - 如果您參與的項目或工作需要臨時替代，請提供相關的指導或建議。<br>
</div>

<div class="d">4假別</div>
<div><input type="radio" name="sex" value="特休假" checked>特休假</div>
<div><input type="radio" name="sex" value="事假">事假</div>
<div><input type="radio" name="sex" value="病假">病假</div>

<div class="e">5的開始日期</div>
<input type="date">

<div class="f">6的結束日期</div>
<input type="date">

<div class="g">7請假事由</div>
<div><input type="radio" name="sea" value="個人假期" checked>個人假期</div>
<div><input type="radio" name="sea" value="個人假期" checked>家庭緊急是由</div>
<div><input type="radio" name="sea" value="個人假期" checked>健康問題</div>
<div><input type="radio" name="sea" value="個人假期" checked>其他</div>
<div class="h">8職務代理人</div>
<input type="text" placeholder="請填入文字">

<div class="i"><input class="j" type="submit" value="送出"></div>



</html>
</body>
</html>
